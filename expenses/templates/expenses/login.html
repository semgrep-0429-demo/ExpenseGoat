<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Login — Expense Goat</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 400px; margin: 4rem auto; padding: 1rem; }
    h1 { margin-bottom: 1rem; }
    form p { margin: 0.75rem 0; }
    label { display: inline-block; min-width: 80px; }
    input { padding: 0.35rem; width: 200px; }
    button { padding: 0.5rem 1rem; background: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 0.5rem; }
    .error { color: #c00; font-size: 0.9rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <h1>Expense Goat</h1>
  <form method="post" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form.as_p }}
    <input type="hidden" name="next" value="{{ next|default:'/expenses/' }}">
    <button type="submit">Log in</button>
  </form>
  {% if form.non_field_errors %}
  <p class="error">{{ form.non_field_errors.0 }}</p>
  {% endif %}
</body>
</html>
