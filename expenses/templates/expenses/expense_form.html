{% extends "expenses/base.html" %}
{% block title %}{{ title }} — Expense Goat{% endblock %}
{% block content %}
<h1>{{ title }}</h1>
<form method="post">
  {% csrf_token %}
  {{ form.as_p }}
  <button type="submit" class="btn">Save</button>
  {% if expense %}
  <a href="{% url 'expense_detail' expense.pk %}" class="btn btn-secondary">Cancel</a>
  {% else %}
  <a href="{% url 'expense_list' %}" class="btn btn-secondary">Cancel</a>
  {% endif %}
</form>
{% endblock %}
