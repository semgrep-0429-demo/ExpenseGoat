{% extends "expenses/base.html" %}
{% block title %}Upload receipt — Expense #{{ expense.id }}{% endblock %}
{% block content %}
<h1>Upload receipt for expense #{{ expense.id }}</h1>
<form method="post" enctype="multipart/form-data">
  {% csrf_token %}
  <p>
    <label>File:</label>
    <input type="file" name="receipt_file" accept="image/*,.pdf">
  </p>
  <button type="submit" class="btn">Upload</button>
  <a href="{% url 'expense_detail' expense.pk %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
